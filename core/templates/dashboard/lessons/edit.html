{% extends 'dashboard/base.html' %}
{% block body %}

<div class="page-hero d-sm-flex align-items-center justify-content-between">
    <div>
        <h1 class="page-hero-title">تعديل الدرس</h1>
    </div>
    <div class="page-hero-actions">
        <span class="status-pill">{{ lesson.name }}</span>
    </div>
</div>

<div class="card content-card mb-4">
    <div class="card-header border-0">
        <div class="panel-header tight">
            <div>
                <h6 class="panel-title">بيانات الدرس</h6>
                <p class="panel-subtitle">تعديل معلومات الدرس والطلاب الذين حضروا هذا الدرس.</p>
            </div>
        </div>
    </div>
    <form action="#" method="post">
        <div class="modal-body">
            {% csrf_token %}
            <div class="form-shell">
                <div class="form-grid">
                    <div class="form-field">
                        <label class="field-label">اسم الدرس</label>
                        <input type="text" name="name" class="form-control form-control-user" value="{{ lesson.name }}" required>
                    </div>
                    <div class="form-field">
                        <label class="field-label">التاريخ</label>
                        <input type="date" name="date" class="form-control form-control-user" value="{{ lesson.date|date:"Y-m-d" }}" required>
                    </div>
                    <div class="form-field full">
                        <label class="field-label">الطلاب الحاضرون</label>
                        <div class="border rounded p-3">
                            {% for student in students %}
                                <div class="custom-control custom-checkbox mb-2">
                                    <input class="custom-control-input" type="checkbox" id="lesson-edit-student-{{ student.id }}" name="attend_student_ids" value="{{ student.id }}" {% if student.id in selected_student_ids %}checked{% endif %}>
                                    <label class="custom-control-label" for="lesson-edit-student-{{ student.id }}">{{ student.name }}</label>
                                </div>
                            {% empty %}
                                <p class="m-0 text-muted">لا يوجد طلاب متاحون.</p>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <div class="form-actions w-100">
                <a class="btn btn-secondary" href="/lessons/show">عودة</a>
                <input class="btn btn-success btn-user" type="submit" value="تعديل">
            </div>
        </div>
    </form>
</div>

{% endblock %}
